# Connection and authentication
DBUSER='c##checkmk:********::localhost:1521:'
DBUSER_XE1='/:::::oooo'
DBUSER_XE2='xe2user:xe2pwd:SYSDBA:localhost1:1521:'
ASMUSER='asm-user:asm-password:SYSASM:ignored:ignored:'
REMOTE_INSTANCE_1='check_mk:mypassword:sysdba:myRemoteHost:1521:myOracleHost:MYINST3:11.2'
OLRLOC=/etc/oracle/olr.loc

# Sections to run in foreground and wait for the result
SYNC_SECTIONS='instance performance systemparameter processes sessions longactivesessions logswitches undostat recovery_area recovery_status dataguard_stats locks'

# Sections to run in the background, at a slower interval cached
ASYNC_SECTIONS='tablespaces rman jobs resumable'

# Sections to run in foreground for ASM
SYNC_ASM_SECTIONS='instance processes'

# Sections to run in the background for ASM
ASYNC_ASM_SECTIONS='asm_diskgroup'

# Cache time (i.e. check interval) for async sections
CACHE_MAXAGE=601

# Cache time for custom SQL sections
SQLS_MAX_CACHE_AGE=301

# Only monitor the following SIDs (if found)
ONLY_SIDS='XE1 XEXE'

# Skip the following SIDs (if found)
SKIP_SIDS='XE2'

# Do not monitor the following SIDs at all
EXCLUDE_AAA=ALL
EXCLUDE_BBB=ALL
EXCLUDE_CCC=jobs

# Custom SQL queries
SQLS_SECTIONS="mycustomsection1 mycustomsection2 mycustomsection3 mycustomsection4 mycustomsection5"
mycustomsection1 () {
    SQLS_SIDS="MYINST3"
    SQLS_DIR="/etc/check_mk"
    SQLS_SQL="MyCustomSQL.sql"
    SQLS_ITEM_NAME="my_item"
}
mycustomsection2 () {
    SQLS_SIDS=${ORACLE_SID:-$SIDS}  # should be executed for all SIDs
    SQLS_SQL="OtherSQL.sql"
    SQLS_SECTION_NAME="my_custom_section"
    SQLS_SECTION_SEP="124"
}
mycustomsection3 () {
    # SQLS_SIDS set to a command call, so this custom metric is defined for all instances
    SQLS_SIDS=$(UNIX95=true ps -ef | "${AWK}" '{print $NF}' | "${GREP}" -E '^asm_pmon_|^ora_pmon_|^xe_pmon_|^db_pmon_' | cut -d"_" -f3- | sort)
    SQLS_SQL="custom_sql.sql"
}
mycustomsection4 () {
    SQLS_SIDS="MYINST3 MYINST2"
    SQLS_SQL="custom_sql_2.sql"
}
mycustomsection5 () {
    SQLS_SIDS="NOT_USED"
    SQLS_TNSALIAS="TNS"
    SQLS_SQL="custom_sql_2.sql"
}