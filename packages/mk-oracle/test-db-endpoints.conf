# shellcheck shell=bash
# Test database endpoint for the mk-oracle component tests: the single
# source of truth for every runner (run, cargo_run, run.ps1 and the
# legacy comparison scripts source or parse this file; the CI jobs
# reach it via run).
#
# Plain KEY=VALUE only: this file is sourced by bash and parsed by
# PowerShell. No credentials here, ever - the password comes from the
# environment (CI_ORA_TEST_PASSWORD).
#
# shellcheck disable=SC2034  # the variables are used by the sourcing scripts
#
# Scope: the component suite's assertions are calibrated for a 23c
# container database like the ci endpoint below (PDB row counts,
# container-qualified prefixes, a version check requiring 2x). Pointing
# CI_ORA2_DB_TEST at a 19c or non-CDB database fails ~10 tests by
# construction - a known suite limitation, not a plugin bug (verified
# 2026-07-09: the plugin's output against a 19c non-CDB instance is
# correct). Use deploy-run for manual plugin testing against such
# databases; making them supported suite targets means making those
# assertions architecture-aware first (CMK-36706).

# --- ci: the CI database (Jenkins secret CI_ORA_TEST_PASSWORD)
ci_host=oracle-rocky-ci.lan.checkmk.net
ci_port=1521
ci_service=dbtest23
ci_instance=_
ci_sid=SID23
ci_user=system
