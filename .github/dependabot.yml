version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "ArcturianWarrior999"
    labels:
      - "dependencies"
      - "rust"
    allow:
      - dependency-type: "all"

  # Node.js/pnpm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 10
    reviewers:
      - "ArcturianWarrior999"
    labels:
      - "dependencies"
      - "javascript"
    allow:
      - dependency-type: "all"

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 10
    reviewers:
      - "ArcturianWarrior999"
    labels:
      - "dependencies"
      - "python"
    allow:
      - dependency-type: "all"

  # Go dependencies
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "ArcturianWarrior999"
    labels:
      - "dependencies"
      - "go"
    allow:
      - dependency-type: "all"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "ArcturianWarrior999"
    labels:
      - "dependencies"
      - "github-actions"
    allow:
      - dependency-type: "all"
